<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Email Classifier Agent | Aaron Creor</title>
  <meta
    name="description"
    content="Classify pasted IT ticket email text as a request, incident, or needing human review."
  >
  <link rel="stylesheet" href="../css/index.css?v=20260426d">
</head>
<body>
  <canvas id="bg" aria-hidden="true"></canvas>

  <main class="wrap">
    <div class="container">
      <div class="uiControls" aria-label="Display controls">
        <button
          id="themeToggle"
          class="themeToggle"
          type="button"
          aria-label="Background mode: stars"
          title="Background mode: stars"
        >
          &#10024;
        </button>
      </div>

      <header class="toolHeader">
        <div class="toolNav">
          <a class="sectionLinkButton backLink" href="index.html">Back to mini projects</a>
          <a class="sectionLinkButton backLink" href="../index.html">Homepage</a>
        </div>
        <h1 class="name">Email Classifier Agent</h1>
        <p class="tagline">
          Paste email body to classify as being a request, incident, or needing human review.
        </p>
      </header>

      <section class="section">
        <form class="emailClassifier emailClassifierStandalone" id="emailClassifierForm">
          <label class="emailClassifierLabel" for="emailClassifierBody">Email body</label>
          <textarea
            id="emailClassifierBody"
            name="emailBody"
            rows="10"
            autocomplete="off"
            spellcheck="true"
            placeholder="Paste the ticket email body here"
          ></textarea>

          <div class="emailClassifierActions">
            <span class="emailClassifierCount" id="emailClassifierCount">0/1000</span>
            <button class="sectionLinkButton" id="emailClassifierSubmit" type="submit" disabled>
              Classify
            </button>
          </div>

          <div class="emailClassifierStatus" id="emailClassifierStatus" role="status" aria-live="polite"></div>

          <div class="emailClassifierResult" id="emailClassifierResult" hidden>
            <span class="emailClassifierResultLabel" id="emailClassifierResultLabel"></span>
            <p id="emailClassifierResultText"></p>
          </div>
        </form>
      </section>
    </div>
  </main>

  <script src="../js/index.js?v=20260426d" defer></script>
</body>
</html>
