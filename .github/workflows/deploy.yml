name: Deploy Website

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Generate API secret file
        run: |
            mkdir -p api
            cat > api/github-token.php <<'PHP'
            <?php
            return '${{ secrets.GITHUBTOKEN }}';
            PHP

      - name: Stamp deploy timestamp in footer
        run: |
          DEPLOYED_AT="$(date -u '+%b %d, %Y %H:%M UTC')"
          sed -i "s|__LAST_DEPLOYED_AT__|${DEPLOYED_AT}|g" index.html

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          port: ${{ secrets.FTP_PORT || 21 }}
          server-dir: ${{ secrets.REMOTE_PATH || '/public_html/' }}
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/node_modules/**
            **/.env*
